# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name simou.ummada.ac.id;
    return 301 https://simou.ummada.ac.id$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name simou.ummada.ac.id;

    # SSL Certificate - Cloudflare Origin Certificate
    ssl_certificate /home/deffan/SSL/ummada.pem;
    ssl_certificate_key /home/deffan/SSL/ummada-key.pem;

    # SSL Security
    #ssl_protocols TLSv1.2 TLSv1.3;
    #ssl_ciphers EECDH+AESGCM:EDH+AESGCM:EECDH+AES:EECDH+HIGH:EECDH+3DES:HIGH:!aNULL:!MD5;
    #ssl_prefer_server_ciphers on;
    #ssl_session_cache shared:SSL:10m;
    #ssl_session_timeout 10m;

    # Laravel Document Root (public folder)
    root /home/htdocs/simou/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/simou-access.log;
    error_log /var/log/nginx/simou-error.log;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https: https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; font-src 'self' https: data: https://cdnjs.cloudflare.com; img-src 'self' https: data: https://ui-avatars.com; connect-src 'self' https: wss:;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Upload Size
    client_max_body_size 100M;

    # Laravel Main Location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static files caching
    location ~* \.(js|css|ttf|ttc|otf|eot|woff|woff2|jpg|jpeg|png|gif|ico|svg|pdf)$ {
        add_header Access-Control-Allow-Origin "*";
        expires max;
        access_log off;
    }

    # PHP Processing (Laravel - PHP 8.4)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 32k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 64k;
        fastcgi_intercept_errors on;
    }

    # Block hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Deny access to sensitive files
    location ~* \.(env|log|sql)$ {
        deny all;
    }
}
